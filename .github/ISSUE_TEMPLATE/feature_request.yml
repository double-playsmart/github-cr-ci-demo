name: Feature Request
description: Propose a small improvement for the demo repository.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What gap are we trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Review notes
      description: Anything the reviewer should watch for?
