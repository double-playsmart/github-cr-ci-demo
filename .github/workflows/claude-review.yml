name: AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  gemini-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > diff.txt

          PAYLOAD=$(jq -n --rawfile diff diff.txt \
            '{contents: [{parts: [{text: ("You are a front-end code reviewer. Review this PR diff for correctness, regressions, and obvious risks. Be concise and actionable.\n\nDiff:\n" + $diff)}]}]}')

          RESPONSE=$(curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          REVIEW=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text')

          gh pr comment ${{ github.event.pull_request.number }} \
            --body "## AI Code Review (Gemini)

${REVIEW}

---
*Automated review by Gemini 2.0 Flash*"
