name: AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

# ============================================================
# 当前方案：Gemini 2.0 Flash（免费）
# 评分 < 35/50 时 job 失败，可在 branch protection 中设为必须通过
# 切换 Claude：见文件底部注释
# ============================================================

jobs:
  gemini-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > diff.txt

          PAYLOAD=$(jq -n --rawfile diff diff.txt '{
            contents: [{
              parts: [{
                text: (
                  "你是一位资深前端工程师，请对以下 PR diff 进行 Code Review。\n\n" +
                  "按五个维度各给 0-10 分：\n" +
                  "1. 功能正确性（逻辑是否正确，有无明显 bug）\n" +
                  "2. 代码质量（可读性、命名、结构）\n" +
                  "3. 性能（有无不必要的重渲染、大循环等）\n" +
                  "4. 安全性（有无 XSS、数据泄露等风险）\n" +
                  "5. 可维护性（是否易于后续修改）\n\n" +
                  "输出格式要求（严格遵守）：\n" +
                  "先输出五行评分，每行格式：`维度名：X/10 - 简短说明`\n" +
                  "然后输出一行总分：`TOTAL: XX/50`（XX 为五项之和，这行必须存在）\n" +
                  "最后输出综合建议（2-3 句话，中文）。\n\n" +
                  "Diff:\n" + $diff
                )
              }]
            }]
          }')

          RESPONSE=$(curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          REVIEW=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text')

          # 解析总分
          TOTAL=$(echo "$REVIEW" | grep -oP 'TOTAL:\s*\K\d+' | head -1)
          TOTAL=${TOTAL:-0}

          # 决定结论
          if [ "$TOTAL" -ge 35 ]; then
            VERDICT="✅ 评分 ${TOTAL}/50，建议合并"
            EXIT_CODE=0
          else
            VERDICT="❌ 评分 ${TOTAL}/50，建议修改后再合并"
            EXIT_CODE=1
          fi

          {
            echo "## AI Code Review（Gemini 2.0 Flash）"
            echo ""
            echo "${REVIEW}"
            echo ""
            echo "---"
            echo "**${VERDICT}**"
            echo "*由 Gemini 自动生成 · 不替代 CI 检查*"
          } > review_body.md

          gh pr comment ${{ github.event.pull_request.number }} --body-file review_body.md

          exit $EXIT_CODE

