name: AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

# ============================================================
# 当前方案：Gemini 2.0 Flash（免费，适合演示）
# 切换 Claude：见文件底部注释，需要 ANTHROPIC_API_KEY
# ============================================================

jobs:
  gemini-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > diff.txt

          PAYLOAD=$(jq -n --rawfile diff diff.txt '{
            contents: [{
              parts: [{
                text: (
                  "你是一位资深前端工程师，请对以下 PR diff 进行 Code Review。\n\n" +
                  "按五个维度各给 0-10 分，并附简短说明：\n" +
                  "1. **功能正确性**（逻辑是否正确，有无明显 bug）\n" +
                  "2. **代码质量**（可读性、命名、结构）\n" +
                  "3. **性能**（有无不必要的重渲染、大循环等）\n" +
                  "4. **安全性**（有无 XSS、数据泄露等风险）\n" +
                  "5. **可维护性**（是否易于后续修改）\n\n" +
                  "最后给出综合建议：是否可以合并，以及最需要改进的一点。\n" +
                  "输出用中文，格式简洁。\n\n" +
                  "Diff:\n" + $diff
                )
              }]
            }]
          }')

          RESPONSE=$(curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          REVIEW=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text')

          gh pr comment ${{ github.event.pull_request.number }} \
            --body "## AI Code Review（Gemini 2.0 Flash）

${REVIEW}

---
*由 Gemini 自动生成 · 不替代人工 Review 和 CI 检查*"

