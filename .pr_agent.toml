# PR-Agent 配置文件
# 修改后 push 即生效，无需其他操作
# 文档：https://qodo-merge-docs.qodo.ai/usage-guide/configuration_options/

[config]
response_language = "zh-CN"
fallback_models = []           # 禁用自动切换到 o4-mini（无 OpenAI key）
custom_model_max_tokens = 1048576  # gemini-2.5-flash-lite 不在内置表中，需手动指定（1M context）

# ── 自动触发行为 ─────────────────────────────────────────────
[github_action_config]
auto_review = true        # PR 打开时自动执行 review
auto_describe = true      # PR 打开时自动生成描述
auto_improve = false      # 不自动提代码修改建议（可用 /improve 手动触发）

# ── Review 内容控制 ───────────────────────────────────────────
[pr_reviewer]
require_estimate_effort_to_review = true   # 显示 review 所需精力（1-5）
require_tests_review = false               # 关闭「No relevant tests」（项目无测试框架）
require_security_review = true             # 显示安全问题分析
require_ticket_analysis_review = false     # 关闭 ticket 关联分析（无 issue tracker）
require_score_review = true                # 给 PR 打综合分数
require_can_be_split_review = true         # PR 太大时提示拆分
require_todo_scan = true                   # 列出新增 TODO/FIXME/HACK
num_max_findings = 5                       # 最多报告 5 个问题（默认 3）
enable_review_labels_effort = true         # 自动给 PR 打精力标签（effort: 1/5 等）
enable_review_labels_security = true       # 自动给 PR 打 security 标签
enable_help_text = false                   # 去掉评论底部的 Tips 提示，输出更干净

# ============================================================
# ✏️  定制化审查规则（修改这里，push 后即生效）
# ============================================================
extra_instructions = """
你是一位资深前端工程师，专注于游戏平台开发（React/TypeScript/SolidJS）。
审查时重点关注以下规则：

【安全性】
- 禁止将用户输入直接赋值给 innerHTML/outerHTML，防止 XSS 注入
- 敏感信息（API Key、Token）不得出现在代码中

【性能】
- 避免在循环内进行 DOM 操作或重复调用高开销函数
- 避免无意义的大循环（超过 10000 次且无实际业务意义）
- 事件监听器和定时器必须在组件卸载时清理，防止内存泄漏

【代码质量】
- 变量、函数命名必须有实际含义，禁止单字母命名（循环变量 i/j/k 除外）
- 使用 const/let，禁止使用 var

【游戏业务专项】
- 涉及赔率、金额的数值计算，检查浮点精度问题
- WebSocket 消息处理必须考虑竞态条件，避免旧消息覆盖新状态
- 游戏状态变更必须通过统一入口，禁止直接修改状态对象

输出要求：
- 语言：中文
- 区分「必须修改」和「建议优化」并明确标注
- 指出问题时同时给出修改建议

【安全问题格式要求】
如果发现任何安全漏洞（XSS、敏感信息泄露、SQL 注入等），必须在 Security concerns 区块开头输出以下警告块，然后再逐条列出问题：

> [!CAUTION]
> ## 🚫 高危安全问题 — 合并前必须修复
>
> | 序号 | 严重程度 | 问题类型 | 位置 |
> |------|---------|---------|------|
> | 1 | 🔴 高危 | XSS 注入 | `src/main.js:42` |
>
> **禁止在未修复以上问题的情况下合并此 PR。**

（表格内容替换为实际发现的问题，有几条写几条）

如果没有安全问题，Security concerns 正常输出即可，不需要加警告块。
"""

# ── PR 描述生成 ───────────────────────────────────────────────
[pr_description]
publish_labels = true                    # 自动打标签
use_bullet_points = true                 # 描述用列表格式
keep_original_user_description = true   # 保留 PR 模板 checklist，AI 描述追加在下方
include_generated_by_header = false    # 去掉 "Generated by PR-Agent" 水印

# ── /improve 命令：代码改进建议 ──────────────────────────────
[pr_code_suggestions]
num_code_suggestions = 4          # 最多给 4 条改进建议
commitable_code_suggestions = true # /improve 建议直接贴在 diff 行上，带一键 commit 按钮
focus_only_on_problems = true     # 只输出真正的 bug，过滤风格类建议
suggestions_score_threshold = 5   # 0-10 分，低于 5 的弱建议不显示

# ── 忽略文件 ─────────────────────────────────────────────────
[ignore]
glob = [
  "*.lock",
  "dist/**",
  "node_modules/**",
  "*.min.js",
  "*.min.css",
  "docs/**",
  ".github/**"
]
